apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-remediation
spec:
  template:
    spec:
      containers:
      - name: auto-remediation
        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
